<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Green India Eco Industries - Handcrafted, plastic-free sustainable products.">
    <meta name="keywords" content="Eco-friendly, Neem Comb, Bamboo Toothbrush, Sustainable India">

    <title>{{ p.name if p else "Green India" }} | Eco Industries</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
</head>

<body class="products-custom-bg">

    <nav class="glass-nav">
        <div class="nav-container">
            <span class="main-title">Green India Eco Industries</span>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/mission" class="nav-link">Mission</a>
                <a href="/products" class="nav-link">Products</a>
                <a href="/contact" class="nav-link contact-link-large">Contact</a>
            </div>
        </div>
    </nav>

    <div class="products-container">
        <h2 class="section-title">Our <span>Eco-Friendly</span> Catalog</h2>

        <div class="search-container-3d">
            <input type="text" id="productSearch" placeholder="Search products..." class="search-input-glass">
            <button onclick="searchProducts()" class="search-btn-3d">Search</button>
        </div>

        <button id="backToProducts" onclick="resetSearch()" class="back-btn-3d"
            style="display:none; position: static; margin: 0 auto 20px auto;">
            ← Back to All Products
        </button>

       <div class="product-grid">
    <div class="product-card-3d">
        <img src="{{ url_for('static', filename='images/bag-front.jpg') }}" class="product-img">
        <h3>U-Cut Bag</h3>
        <p>100% biodegradable corn-starch bags.</p>
        <div class="card-buttons">
            <button onclick="window.location.href='/product/u-cut-bag'" class="order-now-btn">Check Item</button>
            <button onclick="addToCart()" class="add-to-cart-btn-small">Add to Cart +</button>
        </div>
    </div>
</div>

        <div id="floatingCart" class="floating-cart-bar">
            <div class="cart-info">
                <span id="cartCount">0</span> Items in Cart
            </div>
            <button onclick="window.location.href='/contact'" class="checkout-btn">
                Order via Contact →
            </button>
        </div>

    </div>

    <script>
        let count = 0;

        function searchProducts() {
            let input = document.getElementById('productSearch').value.toLowerCase();
            let cards = document.querySelectorAll('.product-card-3d');
            let backBtn = document.getElementById('backToProducts');

            if (input.trim() === "") return;

            cards.forEach(card => {
                let title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "block" : "none";
            });

            backBtn.style.display = "inline-block";
        }

        function resetSearch() {
            document.querySelectorAll('.product-card-3d').forEach(c => c.style.display = "block");
            document.getElementById('productSearch').value = "";
            document.getElementById('backToProducts').style.display = "none";
        }

        function addToCart() {
            count++;
            document.getElementById('cartCount').innerText = count;
            document.getElementById('floatingCart').classList.add('active');
        }
    </script>

</body>
</html>
