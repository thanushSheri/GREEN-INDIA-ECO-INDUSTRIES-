<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.name }}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
            url("{{ url_for('static', filename='images/eco_bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-products-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .back-products-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #25D366;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .image-section {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .viewport {
            width: 100%;
            overflow: hidden;
            border-radius: 20px;
        }

        .slider-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .slider-track img {
            height: 450px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
        }

        .prev-btn {
            left: 15px;
        }

        .next-btn {
            right: 15px;
        }

        .dots-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active {
            background: #25D366;
            transform: scale(1.3);
        }

        .info-section {
            padding: 50px;
        }

        .tagline {
            color: #25D366;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
            display: block;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 10px;
            line-height: 1.2;
        }

        .desc-line {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 5px solid #25D366;
        }

        .order-btn {
            display: block;
            background: #25D366;
            color: black;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 25px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <a href="/products" class="back-products-btn"><span>←</span> Back to Products</a>

    <div class="container">
        <div class="image-section">
            {% if p.images|length > 1 %}
            <button class="nav-arrow prev-btn" id="prevBtn">&#10094;</button>
            <button class="nav-arrow next-btn" id="nextBtn">&#10095;</button>
            {% endif %}

            <div class="viewport">
                <div class="slider-track" id="track">
                    {% for img in p.images %}
                    <img src="{{ url_for('static', filename='images/' + img) }}" class="slide-img">
                    {% endfor %}
                </div>
            </div>

            <div class="dots-container">
                {% for img in p.images %}
                <div class="dot {% if loop.first %}active{% endif %}" data-slide="{{ loop.index0 }}"></div>
                {% endfor %}
            </div>
        </div>

        <div class="info-section">
            <span class="tagline">• PREMIUM QUALITY</span>
            <h1>{{ p.name }}</h1>

            <div class="description-container">
                {% for line in p.desc %}
                <div class="desc-line">{{ line }}</div>
                {% endfor %}
            </div>

            <div class="action-buttons" style="margin-top: 25px; display: flex; flex-direction: column; gap: 15px;">

                <a href="https://wa.me/918639803725?text=I%20want%20to%20order:%20{{ p.name }}" class="order-btn"
                    style="margin-top: 0; background: #25D366; color: black; text-align: center; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 700;">
                    Order via WhatsApp
                </a>

                <a href="/contact" class="contact-order-btn"
                    style="text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: 600; color: white; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); transition: 0.3s;">
                    Order via Contact Form →
                </a>

            </div>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');
        const slides = document.querySelectorAll('.slide-img');
        const dots = document.querySelectorAll('.dot');
        const total = slides.length;
        let index = 0;

        track.style.width = (total * 100) + "%";
        slides.forEach(s => s.style.width = (100 / total) + "%");

        function updateSlider() {
            track.style.transform = `translateX(-${index * (100 / total)}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        }

        document.getElementById('nextBtn')?.addEventListener('click', () => {
            index = (index + 1) % total;
            updateSlider();
        });

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            index = (index - 1 + total) % total;
            updateSlider();
        });

        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                index = parseInt(e.target.dataset.slide);
                updateSlider();
            });
        });
    </script>
</body>

</html>
