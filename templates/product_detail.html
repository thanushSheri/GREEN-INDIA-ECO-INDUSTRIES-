<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Cut Bag Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #25D366;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url("{{ url_for('static', filename='images/background_leaves.jpg') }}") center/cover fixed;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: white;
        }

        /* --- STABLE 50/50 CONTAINER --- */
        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            width: 90%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Locks 50/50 */
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .back-nav {
            position: absolute; top: 25px; left: 25px; z-index: 100;
        }
        .back-nav a {
            text-decoration: none; color: var(--primary-green);
            background: rgba(0,0,0,0.4); padding: 8px 18px;
            border-radius: 50px; font-size: 13px; font-weight: 600;
            border: 1px solid var(--border);
        }

        /* --- SLIDER SECTION --- */
        .image-section {
            position: relative;
            background: rgba(0,0,0,0.2);
            padding: 80px 30px 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .viewport {
            width: 100%; overflow: hidden; border-radius: 20px;
        }

        .slider-track {
            display: flex;
            width: 400%; /* Important for 4 images */
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .slider-track img {
            width: 25%; /* Exactly 1/4 of the track */
            height: 450px; object-fit: contain;
        }

        /* --- VISIBLE DARK ARROWS --- */
        .nav-arrow {
            position: absolute; top: 55%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7); /* Darker background */
            border: 1px solid var(--border); color: white;
            width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center;
        }
        .nav-arrow:hover { background: var(--primary-green); color: black; }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }

        .dots-container { display: flex; gap: 10px; margin-top: 25px; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; }
        .dot.active { background: var(--primary-green); transform: scale(1.3); }

        /* --- RESTORED DESCRIPTION --- */
        .info-section {
            padding: 60px;
            display: flex; flex-direction: column; justify-content: center;
            min-height: 550px; /* Forces visibility */
        }

        .tagline { color: var(--primary-green); font-size: 14px; font-weight: 700; margin-bottom: 5px; }
        h1 { font-size: 3rem; margin: 0; line-height: 1.2; }
        .i-am-not { opacity: 0.7; font-size: 16px; margin-bottom: 30px; letter-spacing: 1px; }

        /* Restored Description Lines */
        .desc-line {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px; border-radius: 12px; margin-bottom: 12px;
            border-left: 5px solid var(--primary-green);
            font-size: 15px;
        }

        .order-btn {
            background: var(--primary-green); color: black;
            text-align: center; padding: 18px; border-radius: 15px;
            text-decoration: none; font-weight: 700; margin-top: 25px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="back-nav"><a href="/products">← Back</a></div>

        <div class="image-section">
            <button class="nav-arrow prev-btn" id="prev">&#10094;</button>
            <button class="nav-arrow next-btn" id="next">&#10095;</button>
            
            <div class="viewport">
                <div class="slider-track" id="track">
                    <img src="{{ url_for('static', filename='images/bag-sizes.jpg') }}">
                    <img src="{{ url_for('static', filename='images/bag-front.jpg') }}">
                    <img src="{{ url_for('static', filename='images/bag-side.jpg') }}">
                    <img src="{{ url_for('static', filename='images/bag-chart.jpg') }}">
                </div>
            </div>

            <div class="dots-container">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="info-section">
            <span class="tagline">• PREMIUM QUALITY</span>
            <h1>U-Cut Bag</h1>
            <p class="i-am-not">I AM NOT PLASTIC</p>
            
            <div class="desc-line">🌱 100% Biodegradable Corn Starch</div>
            <div class="desc-line">💪 Load Capacity: 500g to 15kg</div>
            <div class="desc-line">📏 Thickness: 40 - 50 Microns</div>
            <div class="desc-line">✅ Fully Compostable & Eco-Friendly</div>

            <a href="https://wa.me/918639803725" class="order-btn">Order via WhatsApp</a>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');
        const dots = document.querySelectorAll('.dot');
        const next = document.getElementById('next');
        const prev = document.getElementById('prev');
        
        let currentIdx = 0;
        const totalImgs = 4;

        function updateSlider() {
            // Moves by increments of 25% because there are 4 images (100/4)
            track.style.transform = `translateX(-${currentIdx * 25}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        next.addEventListener('click', () => {
            currentIdx = (currentIdx + 1) % totalImgs;
            updateSlider();
        });

        prev.addEventListener('click', () => {
            currentIdx = (currentIdx - 1 + totalImgs) % totalImgs;
            updateSlider();
        });

        // Click dots to jump
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                currentIdx = i;
                updateSlider();
            });
        });
    </script>
</body>
</html>
